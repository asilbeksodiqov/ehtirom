<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Diss — Qaydlar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══ BILLBOARD ═══ -->
  <section class="billboard" id="billboard">
    <div class="billboard-bg"></div>
    <div class="billboard-content">
      <div class="bb-name" id="bbName"></div>
      <div class="bb-notes-area">
        <p class="bb-text" id="bbText"><span class="bb-cursor" id="bbCursor"></span></p>
        <div class="bb-status" id="bbStatus"></div>
      </div>
    </div>
  </section>

  <!-- ═══ LIST SECTION ═══ -->
  <section class="list-section">
    <div class="list-header">
      <div class="list-meta">
        <span class="list-title">Qaydlar</span>
        <span class="list-count" id="listCount">0</span>
      </div>
      <div class="list-controls">
        <select class="status-filter" id="statusFilter">
          <option value="all">Hammasi</option>
          <option value="kutilmoqda">Kutilmoqda</option>
          <option value="muvaffaqiyatli">Muvaffaqiyatli</option>
          <option value="bekor">Bekor qilindi</option>
        </select>
        <button class="fab" id="fabList" aria-label="Yangi qayd">+</button>
      </div>
    </div>
    <div class="notes-list" id="notesList">
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">✦</span>
        <span class="empty-text">Hali qayd yo'q</span>
      </div>
    </div>
  </section>

  <!-- ═══ ADD SHEET ═══ -->
  <div class="overlay" id="addOverlay"></div>
  <div class="bottom-sheet" id="addSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Yangi qayd</span>
      <button class="sheet-close" id="addSheetClose">✕</button>
    </div>
    <input class="note-title-input" id="titleInput" placeholder="Sarlavha..." maxlength="80" />
    <textarea class="note-textarea" id="noteInput" placeholder="Fikringizni yozing..." rows="6"></textarea>
    <div class="sheet-foot">
      <select class="status-select" id="statusSelect">
        <option value="kutilmoqda">Kutilmoqda</option>
        <option value="muvaffaqiyatli">Muvaffaqiyatli</option>
        <option value="bekor">Bekor qilindi</option>
      </select>
      <button class="btn-save" id="addSaveBtn">Saqlash</button>
    </div>
  </div>

  <!-- ═══ DETAIL / EDIT MODAL ═══ -->
  <div class="overlay" id="detailOverlay"></div>
  <div class="detail-modal" id="detailModal">
    <div class="detail-toolbar">
      <button class="tool-btn" id="editToggleBtn" title="Tahrirlash">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <select class="detail-status-sel" id="detailStatusSel">
        <option value="kutilmoqda">Kutilmoqda</option>
        <option value="muvaffaqiyatli">Muvaffaqiyatli</option>
        <option value="bekor">Bekor qilindi</option>
      </select>
      <button class="tool-btn tool-delete" id="detailDeleteBtn" title="O'chirish">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>

    <!-- paper area — view and edit share this -->
    <div class="detail-paper" id="detailPaper">
      <div class="detail-date" id="detailDate"></div>
      <div class="detail-title" id="detailTitle"></div>
      <input class="detail-title-edit" id="detailTitleEdit" placeholder="Sarlavha..." maxlength="80" />
      <!-- VIEW mode -->
      <div class="detail-body" id="detailBody"></div>
      <!-- EDIT mode -->
      <textarea class="detail-edit-area" id="detailEditArea"></textarea>
    </div>

    <button class="detail-close" id="detailClose">Yopish</button>
  </div>

  <!-- ═══ CONFIRM DIALOG ═══ -->
  <div class="overlay" id="confirmOverlay"></div>
  <div class="confirm-box" id="confirmBox">
    <p class="confirm-msg">Bu qaydni o'chirishni tasdiqlaysizmi?</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirmCancel">Bekor</button>
      <button class="confirm-ok" id="confirmOk">O'chirish</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
